<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Logs — {{ label }}</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, sans-serif; margin: 1rem 0; padding: 0 20px;
           background: #181818; color: #ddd; }
    pre { background: #0d0d0d; color: #ddd; padding: 1rem; border: 1px solid #2a2a2a; border-radius: 4px;
          white-space: pre-wrap; word-break: break-word; font-size: 0.85rem; line-height: 1.4; }
    .head { display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap; }
    .head a { font-size: 0.95rem; color: #7cb7ff; }
    .head strong { color: #f0f0f0; }
    code { background: #2a2a2a; color: #f0f0f0; padding: 0.05rem 0.3rem; border-radius: 3px; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="head">
    <a href="/">← back</a>
    <strong>{{ label }}</strong>
    <span>last {{ lines }} lines</span>
    <code>{{ log_path }}</code>
  </div>
  <pre>{{ content }}</pre>
</body>
</html>
